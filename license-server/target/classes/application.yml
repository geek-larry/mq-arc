server:
  port: 8080

spring:
  application:
    name: license-server

mqtt:
  broker-url: tcp://localhost:1883
  connection-timeout: 30
  keep-alive-interval: 60
  auto-reconnect: true
  clean-session: true
  qos: 1
  timeout: 30000

license:
  server:
    id: license-server

logging:
  level:
    root: INFO
    com.license: DEBUG
