server:
  port: 8081

spring:
  application:
    name: license-client

# RocketMQ 配置
rocketmq:
  name-server: localhost:9876
  producer:
    group: license-client-producer-group
    send-message-timeout: 30000

# 许可客户端配置
license:
  client:
    hostname: ${HOSTNAME:${COMPUTERNAME:unknown-host}}
    consumer:
      group: license-client-consumer-group
  response:
    topic: license-response
    tag: default

# 日志配置
logging:
  level:
    com.license.client: INFO
    org.apache.rocketmq: WARN
